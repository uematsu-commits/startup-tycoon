<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>管理ダッシュボード | スタートアップ・タイクーン</title>
<style>
  :root{
    --bg:#0f1420; --panel:#1a2233; --panel2:#222c42; --line:#2e3a55;
    --txt:#e8edf7; --sub:#8fa0bf; --accent:#4f8cff; --green:#3ddc84;
    --red:#ff5d6c; --yellow:#ffd166;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--txt); font-family:"Hiragino Sans","Noto Sans JP",sans-serif; line-height:1.7;}
  #app{max-width:560px; margin:0 auto; padding:16px 16px 60px;}
  h1{font-size:20px; text-align:center; margin:20px 0 16px;}
  h2{font-size:15px; margin:20px 0 8px; color:var(--sub);}
  .panel{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin-bottom:10px;}
  .grid{display:grid; grid-template-columns:repeat(2,1fr); gap:8px;}
  .kcell{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px; text-align:center;}
  .kcell .l{font-size:11px; color:var(--sub);}
  .kcell .v{font-size:20px; font-weight:800; margin-top:4px;}
  input{width:100%; padding:12px; border-radius:12px; border:1px solid var(--line);
    background:var(--panel2); color:var(--txt); font-size:16px;}
  .btn{display:block; width:100%; padding:13px; border:none; border-radius:12px;
    background:var(--accent); color:#fff; font-size:16px; font-weight:700; cursor:pointer; margin-top:10px;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th,td{border:1px solid var(--line); padding:6px 9px; text-align:left;}
  th{background:var(--panel2); color:var(--sub); font-weight:600;}
  .err{color:var(--red); font-size:13px; margin-top:8px;}
  .sub{color:var(--sub); font-size:12px;}
  .bar-row{display:flex; align-items:center; gap:8px; margin:4px 0; font-size:12px;}
  .bar-row .lbl{width:90px; color:var(--sub); flex-shrink:0;}
  .bar-row .bar{flex:1; height:16px; background:#0c1018; border-radius:4px; overflow:hidden;}
  .bar-row .bar i{display:block; height:100%; background:var(--accent);}
  .bar-row .n{width:32px; text-align:right;}
</style>
</head>
<body>
<div id="app">
  <h1>📊 管理ダッシュボード</h1>
  <div id="login" class="panel">
    <p class="sub" style="margin-bottom:8px">管理者パスワードを入力してください</p>
    <input type="password" id="pw" placeholder="パスワード" autocomplete="current-password">
    <button class="btn" id="btnLogin">表示する</button>
    <div class="err" id="loginErr"></div>
  </div>
  <div id="dash" style="display:none"></div>
</div>

<script>
'use strict';
const FN_URL = 'https://fdgyloydctrcwpompaoq.supabase.co/functions/v1/tycoon-stats';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZkZ3lsb3lkY3RyY3dwb21wYW9xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MjEzNjgsImV4cCI6MjA5NjI5NzM2OH0.-gll2CAGLVcx3bco2zRA6BnXg4Jf9EiZ1FXbl_DOfFI';
const $ = s => document.querySelector(s);

const INDS = {saas:'☁️ SaaS', ai:'🤖 AI', ec:'🛒 EC', game:'🎮 ゲーム'};
const OUTS = {ipo:'🔔 IPO', ma:'🤝 M&A', bankrupt:'💸 倒産', timeout:'🏢 時間切れ'};

function fmtSec(s){
  s = Math.round(s);
  if(s >= 3600) return Math.floor(s/3600)+'時間'+Math.floor(s%3600/60)+'分';
  if(s >= 60) return Math.floor(s/60)+'分'+(s%60)+'秒';
  return s+'秒';
}
function fmtMan(man){
  man = Math.round(man);
  if(Math.abs(man) >= 10000) return (man/10000).toFixed(1)+'億円';
  return man.toLocaleString()+'万円';
}
function bars(obj, total){
  const entries = Object.entries(obj||{});
  if(!entries.length) return '<p class="sub">データなし</p>';
  const max = Math.max(...entries.map(([,n])=>n));
  return entries.map(([k,n])=>`<div class="bar-row"><div class="lbl">${k}</div>
    <div class="bar"><i style="width:${n/max*100}%"></i></div><div class="n">${n}</div></div>`).join('');
}

async function load(pw){
  $('#loginErr').textContent = '';
  const res = await fetch(FN_URL, {headers:{
    'x-admin-key': pw,
    apikey: SB_KEY,
    Authorization: 'Bearer ' + SB_KEY,
  }});
  if(res.status === 401){ sessionStorage.removeItem('tycoon_admin'); throw new Error('パスワードが違います'); }
  if(!res.ok) throw new Error('取得エラー (' + res.status + ')');
  return res.json();
}

function renderDash(d){
  const f = d.funnel || {};
  const pct = (a,b)=> b>0 ? Math.round(a/b*100)+'%' : '-';
  const indMap = {}; Object.entries(d.by_industry||{}).forEach(([k,v])=> indMap[INDS[k]||k]=v);
  const outMap = {}; Object.entries(d.outcomes||{}).forEach(([k,v])=> outMap[OUTS[k]||k]=v);
  $('#dash').innerHTML = `
    <div class="grid">
      <div class="kcell"><div class="l">ユニークプレイヤー</div><div class="v">${d.unique_players}人</div></div>
      <div class="kcell"><div class="l">総プレイ回数</div><div class="v">${d.total_plays}回</div></div>
      <div class="kcell"><div class="l">平均プレイ時間</div><div class="v">${fmtSec(d.avg_play_sec)}</div></div>
      <div class="kcell"><div class="l">最後までプレイ</div><div class="v">${d.finished_plays}回</div></div>
    </div>

    <h2>📅 日別プレイ数（直近14日）</h2>
    <div class="panel">${bars(d.daily_plays_14d)}</div>

    <h2>🏭 業種別プレイ数</h2>
    <div class="panel">${bars(indMap)}</div>

    <h2>🏁 結末の内訳</h2>
    <div class="panel">${bars(outMap)}
      <p class="sub" style="margin-top:8px">イグジット平均スコア: <b>${fmtMan(d.avg_exit_score_man)}</b>
      ${d.best_exit && d.best_exit.score_man ? ` ／ 最高記録: ${fmtMan(d.best_exit.score_man)}（${d.best_exit.rank||''}）` : ''}</p>
    </div>

    <h2>🪜 進行ファネル（どこまで到達したか）</h2>
    <div class="panel">
      <table>
        <tr><th>ステップ</th><th>セッション数</th><th>開始比</th></tr>
        <tr><td>ゲーム開始</td><td>${f.start??0}</td><td>100%</td></tr>
        <tr><td>初回調達</td><td>${f.funded??0}</td><td>${pct(f.funded,f.start)}</td></tr>
        <tr><td>シリーズA到達</td><td>${f.series_a??0}</td><td>${pct(f.series_a,f.start)}</td></tr>
        <tr><td>IPO準備開始</td><td>${f.ipo_prep??0}</td><td>${pct(f.ipo_prep,f.start)}</td></tr>
        <tr><td>イグジット達成</td><td>${f.exit??0}</td><td>${pct(f.exit,f.start)}</td></tr>
      </table>
    </div>

    <h2>🕳 詰まりポイント分析</h2>
    <div class="panel">
      <p class="sub">倒産した時期の分布（ゲーム内月数）</p>
      ${bars(d.bankrupt_month_hist)}
      <p class="sub" style="margin-top:10px">途中離脱した時期の分布（クリアも倒産もせず閉じた）</p>
      ${bars(d.abandon_month_hist)}
      <p class="sub" style="margin-top:8px">ゲーム終了時の中央値: ${d.median_end_month ? Math.round(d.median_end_month)+'ヶ月目' : '-'}</p>
    </div>

    <h2>💼 M&Aオファー</h2>
    <div class="panel">
      <p class="sub">提示 ${d.ma_offers?.shown??0}回 ／ 受諾 ${d.ma_offers?.accepted??0}回
      （受諾率 ${pct(d.ma_offers?.accepted, d.ma_offers?.shown)}）</p>
    </div>

    <button class="btn" id="btnReload">🔄 更新</button>
    <p class="sub" style="text-align:center; margin-top:10px"><a href="./" style="color:var(--sub)">ゲームに戻る</a></p>
  `;
  $('#btnReload').onclick = ()=> init(sessionStorage.getItem('tycoon_admin'));
}

async function init(pw){
  try{
    const d = await load(pw);
    sessionStorage.setItem('tycoon_admin', pw);
    $('#login').style.display = 'none';
    $('#dash').style.display = 'block';
    renderDash(d);
  }catch(e){
    $('#login').style.display = 'block';
    $('#loginErr').textContent = e.message;
  }
}

$('#btnLogin').onclick = ()=> init($('#pw').value.trim());
$('#pw').addEventListener('keydown', e=>{ if(e.key==='Enter') init($('#pw').value.trim()); });
const saved = sessionStorage.getItem('tycoon_admin');
if(saved) init(saved);
</script>
</body>
</html>
